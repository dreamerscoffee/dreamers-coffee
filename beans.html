<style>
:root {
  --bg: #FAFAF7; --white: #FFFFFF;
  --brown-deep: #2C1A0E; --brown: #5C3A1E; --brown-mid: #8B5E3C;
  --brown-light: #C49A6C; --brown-pale: #E8D5BE; --brown-mist: #F2EAE0;
  --text: #2C1A0E; --text-mid: #7A5C47; --text-light: #A8937E;
  --border: #E0D0BC;
  --font: 'M PLUS Rounded 1c', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-weight: 300; font-size: 14px; line-height: 1.7; }
a { color: inherit; text-decoration: none; }
img { display: block; width: 100%; }

.nav-wrap { position: sticky; top: 0; z-index: 200; background: var(--brown-deep); }
.nav-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 2rem; height: 64px; }
.nav-logo { grid-column: 2; text-align: center; font-size: 1rem; letter-spacing: 0.3em; color: var(--brown-light); font-weight: 400; }
.nav-cart { grid-column: 3; justify-self: end; display: flex; align-items: center; gap: 6px; font-size: 11px; letter-spacing: 0.15em; color: var(--brown-light); }
.nav-cart svg { stroke: var(--brown-light); }
.nav-cart-badge { display: none; background: var(--brown-light); color: var(--brown-deep); border-radius: 50%; width: 18px; height: 18px; font-size: 10px; align-items: center; justify-content: center; font-weight: 700; }

.page-header { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem 0; }
.page-header-back { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 11px; letter-spacing: 0.15em; color: var(--text-light); margin-bottom: 1.2rem; transition: color 0.2s; }
.page-header-back:hover { color: var(--brown); }
.page-tag { font-size: 10px; letter-spacing: 0.4em; color: var(--brown-light); margin-bottom: 0.5rem; }
.page-title { font-size: 2rem; font-weight: 400; color: var(--brown-deep); margin-bottom: 1.5rem; }

.tabs-wrap { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
.tabs { display: flex; border-bottom: 1px solid var(--border); }
.tab-btn { padding: 1rem 2rem; font-family: var(--font); font-size: 13px; letter-spacing: 0.1em; color: var(--text-light); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.2s; margin-bottom: -1px; }
.tab-btn:hover { color: var(--brown); }
.tab-btn.active { color: var(--brown-deep); border-bottom-color: var(--brown-deep); font-weight: 500; }
.tab-price { font-size: 11px; color: var(--text-light); margin-left: 0.5rem; }
.tab-btn.active .tab-price { color: var(--brown-light); }

.info-bar { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; gap: 2rem; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
.info-bar-item { font-size: 11px; color: var(--text-light); }
.info-bar-item strong { color: var(--text-mid); font-weight: 400; margin-left: 0.3rem; }

.beans-section { max-width: 1200px; margin: 0 auto; padding: 2rem 2rem 5rem; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.beans-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }

.bean-card { background: var(--white); border: 1px solid var(--border); overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; }
.bean-card:not(.sold-out) { cursor: pointer; }
.bean-card:not(.sold-out):hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(44,26,14,0.1); }
.bean-card.sold-out { opacity: 0.55; }
.bean-card-img { aspect-ratio: 1; overflow: hidden; background: var(--brown-mist); position: relative; }
.bean-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.bean-card:not(.sold-out):hover .bean-card-img img { transform: scale(1.05); }
.bean-badge { position: absolute; top: 10px; left: 10px; font-size: 9px; letter-spacing: 0.12em; padding: 3px 8px; }
.bean-badge.instock { background: var(--brown-deep); color: white; }
.bean-badge.soldout { background: #aaa; color: white; }
.bean-badge.decaf { background: var(--brown-mid); color: white; }
.bean-card-body { padding: 1.2rem; }
.bean-origin { font-size: 9px; letter-spacing: 0.25em; color: var(--brown-light); margin-bottom: 0.4rem; }
.bean-name { font-size: 15px; font-weight: 500; color: var(--brown-deep); margin-bottom: 0.5rem; }
.bean-flavor { font-size: 11px; color: var(--text-light); line-height: 1.7; margin-bottom: 1rem; min-height: 3.4em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.bean-price { font-size: 15px; color: var(--brown); margin-bottom: 1rem; }
.bean-price span { font-size: 11px; color: var(--text-light); }
.btn-card { display: block; width: 100%; background: var(--brown-deep); color: white; font-size: 11px; letter-spacing: 0.15em; padding: 11px; text-align: center; border: none; cursor: pointer; font-family: var(--font); transition: background 0.3s; }
.btn-card:hover { background: var(--brown); }
.btn-card.disabled { background: #ccc; color: #999; cursor: not-allowed; pointer-events: none; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(44,26,14,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 1.5rem; }
.modal-overlay.open { display: flex; }
.modal { background: var(--white); max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
.modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-light); z-index: 1; line-height: 1; padding: 4px; }
.modal-close:hover { color: var(--text); }
.modal-inner { display: grid; grid-template-columns: 1fr 1fr; }
.modal-img { aspect-ratio: 1; object-fit: cover; width: 100%; height: 100%; }
.modal-body { padding: 2rem; display: flex; flex-direction: column; gap: 1rem; }
.modal-tag { font-size: 9px; letter-spacing: 0.3em; color: var(--brown-light); }
.modal-name { font-size: 1.4rem; font-weight: 500; color: var(--brown-deep); line-height: 1.3; }
.modal-flavor { font-size: 12px; color: var(--text-mid); line-height: 2; }
.modal-details { border-top: 1px solid var(--border); padding-top: 0.8rem; }
.modal-detail-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-mid); padding: 0.35rem 0; border-bottom: 1px dashed var(--border); }
.modal-detail-row:last-child { border-bottom: none; }
.modal-detail-row span:first-child { color: var(--text-light); flex-shrink: 0; margin-right: 1rem; }
.modal-price { font-size: 1.4rem; color: var(--brown); }
.modal-price span { font-size: 11px; color: var(--text-light); }
.btn-modal { display: block; width: 100%; background: var(--brown-deep); color: white; font-size: 11px; letter-spacing: 0.2em; padding: 14px; text-align: center; border: none; cursor: pointer; font-family: var(--font); transition: background 0.3s; }
.btn-modal:hover { background: var(--brown); }
.btn-modal-cart { display: none; text-align: center; font-size: 11px; color: var(--text-light); text-decoration: underline; cursor: pointer; margin-top: 6px; }
.btn-modal-cart:hover { color: var(--brown); }

.related { background: var(--brown-mist); border-top: 1px solid var(--border); }
.related-inner { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; }
.related-title { font-size: 10px; letter-spacing: 0.3em; color: var(--brown-light); margin-bottom: 1.5rem; }
.related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
.related-card { background: var(--white); border: 1px solid var(--border); overflow: hidden; transition: transform 0.3s; }
.related-card:hover { transform: translateY(-3px); }
.related-card img { aspect-ratio: 1; object-fit: cover; }
.related-card-body { padding: 1rem; }
.related-card-name { font-size: 13px; color: var(--brown-deep); margin-bottom: 0.3rem; }
.related-card-price { font-size: 12px; color: var(--brown-light); }

.footer-mini { background: #100C09; padding: 2rem; text-align: center; }
.footer-mini-logo { font-size: 0.9rem; letter-spacing: 0.3em; color: var(--brown-light); margin-bottom: 0.8rem; }
.footer-mini-copy { font-size: 11px; color: rgba(255,255,255,0.2); }

#cart-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--brown-deep); color: white; padding: 12px 24px; font-size: 13px; z-index: 9999; opacity: 0; transition: opacity 0.3s; white-space: nowrap; pointer-events: none; }

@media (max-width: 1024px) { .beans-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 768px) {
  .beans-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
  .tab-btn { padding: 0.8rem 1rem; font-size: 12px; }
  .modal-inner { grid-template-columns: 1fr; }
  .modal-img { max-height: 200px; }
  .related-grid { grid-template-columns: 1fr 1fr; }
}
</style>
<script src="/cart.js" defer></script>
</head>
<body>

<div class="nav-wrap">
  <div class="nav-inner">
    <a class="nav-logo" href="/">DREAMERS COFFEE</a>
    <a href="/cart.html" class="nav-cart" id="nav-cart-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/>
      </svg>
      CART
      <span id="cart-badge" class="nav-cart-badge">0</span>
    </a>
  </div>
</div>

<div class="page-header">
  <a href="index.html" class="page-header-back">← Back</a>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab-btn active" id="tab-105g" onclick="switchTab('105g', this)">
      105g（7日分）<span class="tab-price">¥980〜</span>
    </button>
    <button class="tab-btn" id="tab-210g" onclick="switchTab('210g', this)">
      210g（14日分）<span class="tab-price">¥1,380〜</span>
    </button>
  </div>
</div>

<div class="info-bar">
  <div class="info-bar-item">内容量<strong id="info-volume">105g（3種類 各35g）</strong></div>
  <div class="info-bar-item">挽き方<strong>ホール豆</strong></div>
  <div class="info-bar-item">賞味期限<strong>焙煎日より30日</strong></div>
  <div class="info-bar-item">送料<strong>385円（3,000円以上で無料）</strong></div>

<div class="beans-section">

<div class="related">

      <a class="related-card" href="product-bag.html">
        <img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=400&q=80" alt="珈琲バッグ">

      <a class="related-card" href="product-trial.html">
        <img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=400&q=80" alt="お試しセット">
        <div class="related-card-body"><div class="related-card-name">お試しセット</div><div class="related-card-price">¥2,500</div></div>
      </a>

        <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400&q=80" alt="定期便">

<div class="footer-mini">

  <div class="footer-mini-copy">© 2026 DREAMERS COFFEE. All rights reserved.</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalOverlay(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-inner">
      <img class="modal-img" id="modal-img" src="" alt="">
      <div class="modal-body">
        <div>
          <p class="modal-tag" id="modal-tag"></p>
          <h2 class="modal-name" id="modal-name"></h2>
          <p class="modal-flavor" id="modal-flavor"></p>
          <div class="modal-details" id="modal-details"></div>
        </div>
        <div>
          <div class="modal-price" id="modal-price"></div>
          <button class="btn-modal" id="modal-buy">カートに追加</button>
          <a href="/cart.html" class="btn-modal-cart" id="modal-cart-link">カートを見る →</a>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="cart-toast"></div>

<script>
const BEANS = [
  { id:'mexico', name:'メキシコ', region:'チアパス州', flavor:'ライムやグリーンアップルの爽やかな酸味とカカオ・ナッツのようなコク。', producer:'マヤビニック生産者協同組合', altitude:'1,000〜1,700m', variety:'アラビカ種（ティピカ、ムンドヌーボ他）', process:'ウォッシュト', note:'有機JAS認証、フェアトレード、農薬不使用', image:'https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=700&q=80', available:true },
  { id:'peru', name:'ペルー', region:'ペルー', flavor:'いちごのような柔らかい酸味と焼きりんごの甘酸っぱさ。バランスの良いティーライク。', producer:'TUNKIMAYU COFFEE / ANEAN AMAZON COFFEE', altitude:'1,800〜2,100m', variety:'アラビカ種（レッドブルボン）', process:'72時間発酵、ウォッシュト', note:'トップスペシャルティ、栽培期間中農薬不使用', image:'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=700&q=80', available:true },
  { id:'indonesia', name:'インドネシア', region:'スマトラ島', flavor:'どっしりとしたコクと低い酸味、アーシーな風味が特徴のフルボディな一杯。', image:'https://images.unsplash.com/photo-1442512595331-e89e73853f31?w=700&q=80', available:true },
  { id:'decaf', name:'デカフェ', region:'－', flavor:'カフェインを99%除去しながらも、豆本来の甘みとコクをしっかり残した一杯。', image:'https://images.unsplash.com/photo-1506619216599-9d16d0903dfd?w=700&q=80', available:true, isDecaf:true }
];

const PRICES = { '105g':{ default:980, decaf:1080 }, '210g':{ default:1380, decaf:1480 } };
const VOLUMES = { '105g':'105g（3種類 各35g）', '210g':'210g（3種類 各70g）' };
let currentTab = '105g';

function getPrice(bean, tab) { return bean.isDecaf ? PRICES[tab].decaf : PRICES[tab].default; }

function renderGrid(gridId, tab) {
  document.getElementById(gridId).innerHTML = BEANS.map(bean => {
    const price = getPrice(bean, tab);
    const badge = bean.isDecaf ? `<span class="bean-badge decaf">DECAF</span>`
      : bean.available ? `<span class="bean-badge instock">IN STOCK</span>`
      : `<span class="bean-badge soldout">COMING SOON</span>`;
    const btn = bean.available
      ? `<button class="btn-card" onclick="openModal('${bean.id}','${tab}')">詳細 / 購入する</button>`
      : `<button class="btn-card disabled">準備中</button>`;
    return `<div class="bean-card${bean.available ? '' : ' sold-out'}">
      <div class="bean-card-img"><img src="${bean.image}" alt="${bean.name}" loading="lazy">${badge}</div>
      <div class="bean-card-body">
        <p class="bean-origin">${bean.region}</p>
        <p class="bean-name">${bean.name}</p>
        <p class="bean-flavor">${bean.flavor}</p>
        <p class="bean-price">¥${price.toLocaleString()}<span>（税込・送料別）</span></p>
        ${btn}
      </div>
    </div>`;
  }).join('');
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
  document.getElementById('info-volume').textContent = VOLUMES[tab];
}

function openModal(id, tab) {
  const bean = BEANS.find(b => b.id === id);
  if (!bean || !bean.available) return;
  const price = getPrice(bean, tab);
  document.getElementById('modal-img').src = bean.image;
  document.getElementById('modal-tag').textContent = bean.region !== '－' ? bean.region : '';
  document.getElementById('modal-name').textContent = bean.name;
  document.getElementById('modal-flavor').textContent = bean.flavor;
  document.getElementById('modal-price').innerHTML = `¥${price.toLocaleString()}<span>（税込・送料別）</span>`;
  document.getElementById('modal-cart-link').style.display = 'none';
  const fields = [['生産者',bean.producer],['標高',bean.altitude],['品種',bean.variety],['精製',bean.process],['その他',bean.note]].filter(([,v])=>v);
  document.getElementById('modal-details').innerHTML = fields.map(([k,v])=>`<div class="modal-detail-row"><span>${k}</span><span>${v}</span></div>`).join('');
  document.getElementById('modal-buy').onclick = function() {
    if (typeof Cart !== 'undefined') {
      const size = tab === '105g' ? '105g（7日分）' : '210g（14日分）';
      Cart.addItem({ id:`beans_${tab}`, name:`珈琲豆 ${size}`, variant:bean.name, price, image:bean.image });
      document.getElementById('modal-cart-link').style.display = 'block';
      showToast(`${bean.name}（${size}）をカートに追加しました`);
    }
  };
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModalOverlay(e) { if (e.target === document.getElementById('modal')) closeModal(); }
function closeModal() { document.getElementById('modal').classList.remove('open'); document.body.style.overflow = ''; }

function showToast(msg) {
  const t = document.getElementById('cart-toast');
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

renderGrid('grid-105g', '105g');
renderGrid('grid-210g', '210g');
</script>
</body>
