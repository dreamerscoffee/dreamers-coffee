<head>

<style>
:root {
  --bg: #FAFAF7; --white: #FFFFFF;
  --brown-deep: #2C1A0E; --brown: #5C3A1E; --brown-mid: #8B5E3C;
  --brown-light: #C49A6C; --brown-pale: #E8D5BE; --brown-mist: #F2EAE0;
  --text: #2C1A0E; --text-mid: #7A5C47; --text-light: #A8937E;
  --border: #E0D0BC;
  --font: 'M PLUS Rounded 1c', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-weight: 300; font-size: 14px; line-height: 1.7; }
a { color: inherit; text-decoration: none; }
img { display: block; width: 100%; }

/* NAV */
.nav-wrap { position: sticky; top: 0; z-index: 200; background: var(--brown-deep); }
.nav-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 2rem; height: 64px; }
.nav-logo { grid-column: 2; text-align: center; font-size: 1rem; letter-spacing: 0.3em; color: var(--brown-light); font-weight: 400; }
.nav-cart { grid-column: 3; justify-self: end; display: flex; align-items: center; gap: 6px; font-size: 11px; letter-spacing: 0.15em; color: var(--brown-light); }
.nav-cart svg { stroke: var(--brown-light); }
.nav-cart-badge { display: none; background: var(--brown-light); color: var(--brown-deep); border-radius: 50%; width: 18px; height: 18px; font-size: 10px; align-items: center; justify-content: center; font-weight: 700; }

/* PAGE HEADER */
.page-header { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem 2rem; border-bottom: 1px solid var(--border); }
.page-header-back { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 11px; letter-spacing: 0.15em; color: var(--text-light); margin-bottom: 1.2rem; transition: color 0.2s; }
.page-header-back:hover { color: var(--brown); }
.page-tag { font-size: 15px; letter-spacing: 0.3em; color: var(--brown-light); margin-bottom: 0.5rem; }
.page-title { font-size: 2rem; font-weight: 400; color: var(--brown-deep); }

/* BEANS GRID */
.beans-section { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem 5rem; }
.beans-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; }

/* BEAN CARD */
.bean-card { background: var(--white); border: 1px solid var(--border); overflow: hidden; display: grid; grid-template-columns: 1fr 1fr; }
.bean-card-img { position: relative; aspect-ratio: 1; overflow: hidden; background: var(--brown-mist); }
.bean-card-img img { width: 100%; height: 100%; object-fit: cover; }
.bean-badge { position: absolute; top: 10px; left: 10px; font-size: 9px; letter-spacing: 0.12em; padding: 3px 8px; }
.bean-badge.instock { background: var(--brown-deep); color: white; }
.bean-badge.decaf { background: var(--brown-mid); color: white; }

.bean-body { padding: 1.8rem; display: flex; flex-direction: column; gap: 0.8rem; }
.bean-roast { font-size: 12px; letter-spacing: 0.15em; color: var(--brown-light); }
.bean-name { font-size: 1.3rem; font-weight: 500; color: var(--brown-deep); line-height: 1.3; }
.bean-flavor { font-size: 12px; color: var(--text-mid); line-height: 1.9; border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 0.2rem; }

.bean-details { border-top: 1px solid var(--border); padding-top: 0.8rem; display: flex; flex-direction: column; gap: 0; }
.bean-detail-row { display: flex; flex-direction: column; font-size: 13px; padding: 0.5rem 0; gap: 0.2rem; }

.bean-detail-row span:first-child { font-size: 10px; letter-spacing: 0.1em; color: var(--text-light); }
.bean-detail-row span:last-child { color: var(--text-mid); }

/* グラム選択 */
.gram-section { padding-top: 1rem; }
.gram-label { font-size: 9px; letter-spacing: 0.25em; color: var(--brown-light); margin-bottom: 0.6rem; }
.gram-btns { display: flex; gap: 0.5rem; margin-bottom: 0.8rem; }
.gram-btn { flex: 1; padding: 8px; border: 1px solid var(--border); background: none; font-family: var(--font); font-size: 12px; color: var(--text-mid); cursor: pointer; transition: all 0.2s; text-align: center; }
.gram-btn:hover { border-color: var(--brown); color: var(--brown); }
.gram-btn.active { border-color: var(--brown-deep); background: var(--brown-deep); color: white; }
.gram-price { font-size: 1.2rem; color: var(--brown); margin-bottom: 1rem; }
.gram-price span { font-size: 11px; color: var(--text-light); }

.btn-add-cart { display: block; width: 100%; background: var(--brown-deep); color: white; font-size: 11px; letter-spacing: 0.2em; padding: 13px; text-align: center; border: none; cursor: pointer; font-family: var(--font); transition: background 0.3s; margin-top: auto; }
.btn-add-cart:hover { background: var(--brown); }
.btn-view-cart { display: none; text-align: center; font-size: 11px; color: var(--text-light); text-decoration: underline; cursor: pointer; margin-top: 6px; }
.btn-view-cart:hover { color: var(--brown); }

/* RELATED */
.related { background: var(--brown-mist); border-top: 1px solid var(--border); }
.related-inner { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; }
.related-title { font-size: 10px; letter-spacing: 0.3em; color: var(--brown-light); margin-bottom: 1.5rem; }
.related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
.related-card { background: var(--white); border: 1px solid var(--border); overflow: hidden; transition: transform 0.3s; }
.related-card:hover { transform: translateY(-3px); }
.related-card img { aspect-ratio: 1; object-fit: cover; }
.related-card-body { padding: 1rem; }
.related-card-name { font-size: 13px; color: var(--brown-deep); margin-bottom: 0.3rem; }
.related-card-price { font-size: 12px; color: var(--brown-light); }

.footer-mini { background: #100C09; padding: 2rem; text-align: center; }
.footer-mini-logo { font-size: 0.9rem; letter-spacing: 0.3em; color: var(--brown-light); margin-bottom: 0.8rem; }
.footer-mini-copy { font-size: 11px; color: rgba(255,255,255,0.2); }

#cart-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--brown-deep); color: white; padding: 12px 24px; font-size: 13px; z-index: 9999; opacity: 0; transition: opacity 0.3s; white-space: nowrap; pointer-events: none; }

@media (max-width: 768px) {
  .beans-grid { grid-template-columns: 1fr; }
  .bean-card { grid-template-columns: 1fr; }
  .bean-card-img { aspect-ratio: 1/1; }
  .related-grid { grid-template-columns: 1fr 1fr; }
}
</style>
<script src="/cart.js" defer></script>
</head>
<body>

<div class="nav-wrap">
  <div class="nav-inner">
    <a class="nav-logo" href="/">DREAMERS COFFEE</a>
    <a href="/cart.html" class="nav-cart" id="nav-cart-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/>
      </svg>
      CART
      <span id="cart-badge" class="nav-cart-badge">0</span>
    </a>
  </div>
</div>

<div class="page-header">
  <a href="index.html" class="page-header-back">← Back</a>
  <p class="page-tag">BEANS — 珈琲豆</p>
</div>

<div class="beans-section">
  <div class="beans-grid" id="beans-grid"></div>
</div>

<div class="related">
  <div class="related-inner">
    <div class="related-title">OTHER PRODUCTS</div>
    <div class="related-grid">
      <a class="related-card" href="product-bag.html">
        <img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=400&q=80" alt="珈琲バッグ">
        <div class="related-card-body"><div class="related-card-name">珈琲バッグ 5袋セット</div><div class="related-card-price">¥1,200</div></div>
      </a>
      <a class="related-card" href="product-trial.html">
        <img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=400&q=80" alt="お試しセット">
        <div class="related-card-body"><div class="related-card-name">お試しセット</div><div class="related-card-price">¥2,500</div></div>
      </a>
      <a class="related-card" href="subscription.html">
        <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400&q=80" alt="定期便">
        <div class="related-card-body"><div class="related-card-name">定期便</div><div class="related-card-price">¥2,980〜 / 月</div></div>
      </a>
    </div>
  </div>
</div>

<div class="footer-mini">
  <div class="footer-mini-logo">DREAMERS COFFEE</div>
  <div class="footer-mini-copy">© 2026 DREAMERS COFFEE. All rights reserved.</div>
</div>

<div id="cart-toast"></div>

<script>
const BEANS = [
  {
    id: 'mexico',
    name: 'メキシコ',
    roast: '中浅煎り',
    flavor: 'ライムやグリーンアップルの爽やかな酸味とカカオ・ナッツのようなコク。',
    producer: 'マヤビニック生産者協同組合',
    altitude: '1,000〜1,700m',
    variety: 'アラビカ種（ティピカ、ムンドヌーボ他）',
    process: 'ウォッシュト',
    note: '有機JAS認証、フェアトレード、農薬不使用',
    image: 'dreamerscoffee-beans-mexico.png',
    prices: { '100g': 1000, '150g': 1400 }
  },
  {
    id: 'peru',
    name: 'ペルー',
    roast: '中浅煎り',
    flavor: 'いちごのような柔らかい酸味と焼きりんごの甘酸っぱさ。バランスの良いティーライク。',
    producer: 'TUNKIMAYU COFFEE / ANEAN AMAZON COFFEE',
    altitude: '1,800〜2,100m',
    variety: 'アラビカ種（レッドブルボン）',
    process: '72時間発酵、ウォッシュト',
    note: 'トップスペシャルティ、栽培期間中農薬不使用',
    image: 'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=700&q=80',
    prices: { '100g': 1200, '150g': 1700 }
  },
  {
    id: 'indonesia',
    name: 'インドネシア',
    roast: '中煎り',
    flavor: 'ハーブの薬膳茶っぽさの中に何となくトロピカルフルーツのような果実感があり、温度が冷めてくると後味にバニラっぽさや黒糖のような甘さも感じられる珈琲。',
    producer: 'クラシックビーンズ生産者組合',
    variety: 'S288・オナンガンジャン・ラスーナ',
    note: 'なし（栽培期間中農薬不使用）',
    process: 'スマトラ式',
    altitude: '1,400〜1,600m',
    image: 'https://images.unsplash.com/photo-1442512595331-e89e73853f31?w=700&q=80',
    prices: { '100g': 1300, '150g': 1850 }
  },
  {
    id: 'decaf',
    name: 'カフェインレス（メキシコ）',
    roast: '中煎り',
    flavor: '焦がしキャラメルのようなコクとプラムのような甘酸っぱさ、マンゴーっぽい優しい甘さが感じられる珈琲。',
    producer: 'マヤビニック生産者協同組合',
    variety: 'アラビカ種（ティピカ、ムンドヌーボ他）',
    note: '有機JAS認証・フェアトレード・農薬不使用・カフェイン99.9%除去',
    process: 'ウォッシュト',
    altitude: '1,000〜1,700m',
    image: 'dreamerscoffee-beans-decaf-mexico.png',
    prices: { '100g': 1200, '150g': 1700 },
    isDecaf: true
  }
];

function renderGrid() {
  document.getElementById('beans-grid').innerHTML = BEANS.map(bean => {
    const badge = '';

    const fields = [
      ['生産者', bean.producer],
      ['栽培品種', bean.variety],
      ['認証', bean.note],
      ['精製', bean.process],
      ['標高', bean.altitude]
    ].filter(([, v]) => v);

    const detailRows = fields.map(([k, v]) =>
      `<div class="bean-detail-row"><span>${k}</span><span>${v}</span></div>`
    ).join('');

    const defaultPrice = bean.prices['100g'];

    return `
      <div class="bean-card">
        <div class="bean-card-img">
          <img src="${bean.image}" alt="${bean.name}" loading="lazy">
          ${badge}
        </div>
        <div class="bean-body">
          <div>
            <p class="bean-roast">${bean.roast}</p>
            <h2 class="bean-name">${bean.name}</h2>
            ${detailRows.length ? `<div class="bean-details">${detailRows}</div>` : ''}
          </div>
          <p class="bean-flavor">${bean.flavor}</p>
          <div class="gram-section">
            <p class="gram-label">グラムを選ぶ</p>
            <div class="gram-btns">
              <button class="gram-btn active" onclick="selectGram(this,'${bean.id}','100g')">100g</button>
              <button class="gram-btn" onclick="selectGram(this,'${bean.id}','150g')">150g</button>
            </div>
            <div class="gram-price" id="price-${bean.id}">¥${defaultPrice.toLocaleString()}<span>（税込・送料別）</span></div>
            <button class="btn-add-cart" onclick="addToCart('${bean.id}')">カートに追加</button>
            <a href="/cart.html" class="btn-view-cart" id="cart-link-${bean.id}">カートを見る →</a>
          </div>
        </div>
      </div>`;
  }).join('');
}

// 各豆の選択グラムを管理
const selectedGram = {};
BEANS.forEach(b => { selectedGram[b.id] = '100g'; });

function selectGram(btn, beanId, gram) {
  // 同カード内のボタンだけ切り替え
  btn.closest('.gram-btns').querySelectorAll('.gram-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedGram[beanId] = gram;

  const bean = BEANS.find(b => b.id === beanId);
  const price = bean.prices[gram];
  document.getElementById(`price-${beanId}`).innerHTML = `¥${price.toLocaleString()}<span>（税込・送料別）</span>`;
}

function addToCart(beanId) {
  if (typeof Cart === 'undefined') return;
  const bean = BEANS.find(b => b.id === beanId);
  const gram = selectedGram[beanId];
  const price = bean.prices[gram];
  Cart.addItem({
    id: `beans_${beanId}_${gram}`,
    name: `珈琲豆（${bean.name}）`,
    variant: gram,
    price,
    image: bean.image
  });
  document.getElementById(`cart-link-${beanId}`).style.display = 'block';
  showToast(`${bean.name} ${gram} をカートに追加しました`);
}

function showToast(msg) {
  const t = document.getElementById('cart-toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

renderGrid();
</script>
</body>
</html>
