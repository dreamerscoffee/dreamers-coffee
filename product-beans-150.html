<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>珈琲豆 210g（14日分） — DREAMERS COFFEE</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FAFAF7;--white:#FFFFFF;--brown-deep:#2C1A0E;--brown:#5C3A1E;--brown-mid:#8B5E3C;
  --brown-light:#C49A6C;--brown-pale:#E8D5BE;--brown-mist:#F2EAE0;
  --text:#2C1A0E;--text-mid:#7A5C47;--text-light:#A8937E;--border:#E0D0BC;
  --font-serif:'Cormorant Garamond',serif;--font-sans:'Noto Sans JP',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);font-weight:300;font-size:14px;line-height:1.7;}
a{color:inherit;text-decoration:none;}
img{display:block;width:100%;}
.nav-wrap{position:sticky;top:0;z-index:200;background:var(--white);border-bottom:1px solid var(--border);}
.nav-inner{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 2rem;height:64px;}
.nav-logo{grid-column:2;font-size:1rem;letter-spacing:0.3em;color:var(--brown-deep);font-weight:400;}
.nav-back{grid-column:1;font-size:11px;letter-spacing:0.1em;color:var(--text-light);display:flex;align-items:center;gap:0.4rem;transition:color 0.2s;}
.nav-back:hover{color:var(--brown);}
.product-wrap{max-width:1000px;margin:0 auto;padding:4rem 2rem;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:start;}
.product-img{aspect-ratio:1;object-fit:cover;background:#f0e8dc;}
.product-tag{font-size:10px;letter-spacing:0.3em;color:var(--brown-light);margin-bottom:0.8rem;}
.product-name{font-family:var(--font-serif);font-size:2.5rem;font-weight:400;color:var(--brown-deep);margin-bottom:0.5rem;line-height:1.2;}
.product-price{font-family:var(--font-serif);font-size:2rem;color:var(--brown);margin:1.5rem 0;}
.product-price span{font-size:12px;color:var(--text-light);font-family:var(--font-sans);}
.product-desc{font-size:13px;color:var(--text-mid);line-height:2.2;margin-bottom:2rem;border-top:1px solid var(--border);padding-top:1.5rem;}
.product-detail{margin-bottom:2rem;}
.product-detail-title{font-size:10px;letter-spacing:0.2em;color:var(--text-light);margin-bottom:0.8rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem;}
.product-detail-item{display:flex;justify-content:space-between;font-size:12px;color:var(--text-mid);padding:0.5rem 0;border-bottom:1px dashed var(--border);}
/* 種類選択 */
.variety-section{margin-bottom:2rem;}
.variety-label{font-size:10px;letter-spacing:0.2em;color:var(--text-light);margin-bottom:0.8rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem;}
.variety-selected{font-size:12px;color:var(--brown);margin-bottom:0.8rem;}
.variety-grid{display:flex;flex-wrap:wrap;gap:0.5rem;}
.variety-btn{border:1px solid var(--border);background:none;padding:7px 14px;font-size:11px;font-family:var(--font-sans);color:var(--text-mid);cursor:pointer;transition:all 0.2s;letter-spacing:0.05em;}
.variety-btn:hover{border-color:var(--brown);color:var(--brown);}
.variety-btn.active{border-color:var(--brown-deep);background:var(--brown-deep);color:white;}
.btn-buy{display:block;width:100%;background:var(--brown-deep);color:white;font-size:12px;letter-spacing:0.2em;padding:16px;text-align:center;margin-top:2rem;transition:background 0.3s;border:none;cursor:pointer;}
.btn-buy:hover{background:var(--brown);}
.related{background:var(--brown-mist);border-top:1px solid var(--border);}
.related-inner{max-width:1000px;margin:0 auto;padding:4rem 2rem;}
.related-title{font-size:10px;letter-spacing:0.3em;color:var(--brown-light);margin-bottom:2rem;}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}
.related-card{background:var(--white);border:1px solid var(--border);overflow:hidden;transition:transform 0.3s;}
.related-card:hover{transform:translateY(-3px);}
.related-card img{aspect-ratio:1;object-fit:cover;}
.related-card-body{padding:1rem;}
.related-card-name{font-size:13px;color:var(--brown-deep);margin-bottom:0.3rem;}
.related-card-price{font-size:12px;color:var(--brown-light);}
.footer-mini{background:#100C09;padding:2rem;text-align:center;}
.footer-mini-logo{font-size:0.9rem;letter-spacing:0.3em;color:var(--brown-light);margin-bottom:0.8rem;}
.footer-mini-copy{font-size:11px;color:rgba(255,255,255,0.2);}
@media(max-width:768px){.product-wrap{grid-template-columns:1fr;gap:2rem;}.related-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="nav-wrap">
  <div class="nav-inner">
    <a class="nav-back" href="index.html">← 戻る</a>
    <a class="nav-logo" href="/">DREAMERS COFFEE</a>
  </div>
</div>
<div class="product-wrap">
  <img class="product-img" src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=700&q=80" alt="珈琲豆 210g（14日分）">
  <div>
    <p class="product-tag">BLEND</p>
    <h1 class="product-name">珈琲豆 210g（14日分）</h1>
    <div class="product-price">¥1,380<span>〜（税込・送料別）</span></div>
    <p class="product-desc" id="bean-desc">上の種類を選ぶと、その豆のフレーバーや詳細情報が表示されます。</p>
        <div class="product-detail">
      <div class="product-detail-title">共通情報</div>
      <div class="product-detail-item"><span>内容量</span><span>210g（3種類 各70g）</span></div>
      <div class="product-detail-item"><span>挽き方</span><span>ホール豆</span></div>
      <div class="product-detail-item"><span>賞味期限</span><span>焙煎日より30日</span></div>
    </div>
    <div class="product-detail" id="bean-detail" style="display:none;">
      <div class="product-detail-title">選択中の豆の詳細</div>
      <div id="bean-table"></div>
    </div>
  </div>

      <div class="variety-grid">
        <button class="variety-btn" onclick="selectVariety(this, 'グアテマラ')">グアテマラ</button>
        <button class="variety-btn" onclick="selectVariety(this, 'メキシコ')">メキシコ</button>
        <button class="variety-btn" onclick="selectVariety(this, 'パプアニューギニア')">パプアニューギニア</button>
        <button class="variety-btn" onclick="selectVariety(this, 'ペルー')">ペルー</button>
        <button class="variety-btn" onclick="selectVariety(this, 'ミャンマー')">ミャンマー</button>
        <button class="variety-btn" onclick="selectVariety(this, 'インドネシア')">インドネシア</button>
        <button class="variety-btn" onclick="selectVariety(this, 'デカフェ')">デカフェ</button>
      </div>
    </div>
    <a href="#" class="btn-buy">購入する</a>
  </div>
</div>
<div class="related">
  <div class="related-inner">
    <div class="related-title">OTHER PRODUCTS</div>
    <div class="related-grid">
      <a class="related-card" href="product-beans-150.html">
        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=400&q=80" alt="珈琲豆 210g（14日分）">
        <div class="related-card-body"><div class="related-card-name">珈琲豆 210g（14日分）</div><div class="related-card-price">¥1,380〜</div></div>
      </a>
      <a class="related-card" href="product-bag.html">
        <img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=400&q=80" alt="珈琲バッグ">
        <div class="related-card-body"><div class="related-card-name">珈琲バッグ 5袋セット</div><div class="related-card-price">¥1,200</div></div>
      </a>
      <a class="related-card" href="product-trial.html">
        <img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=400&q=80" alt="お試しセット">
        <div class="related-card-body"><div class="related-card-name">お試しセット</div><div class="related-card-price">¥2,500</div></div>
      </a>
    </div>
  </div>
</div>
<div class="footer-mini">
  <div class="footer-mini-logo">DREAMERS COFFEE</div>
  <div class="footer-mini-copy">© 2026 DREAMERS COFFEE. All rights reserved.</div>
</div>
<script>
const BEANS = {
  'グアテマラ': {
    flavor: 'みかんやオレンジのような優しい酸味と柔らかな甘さ、ややカカオっぽいコクが特徴の珈琲に仕上げています。',
    producer: 'パストレス水洗工場周辺の小規模農家',
    region: 'グアテマラ サカテペケス県 アンティグア',
    altitude: '1,500〜1,700m',
    variety: 'ブルボン、カツアイ等',
    process: 'ウォッシュト',
    note: '農薬不使用'
  },
  'ペルー': {
    flavor: 'いちごみたいな柔らかい酸味や焼きりんごの甘酸っぱさとほろ苦さがバランスの良いティーライクな珈琲に仕上げています。',
    producer: 'TUNKIMAYU COFFEE / ANEAN AMAZON COFFEE',
    region: 'ペルー',
    altitude: '1,800〜2,100m',
    variety: 'アラビカ種（レッドブルボン）',
    process: '72時間発酵、ウォッシュト',
    note: 'トップスペシャルティコーヒー、栽培期間中農薬不使用'
  },
  'メキシコ': {
    flavor: 'ライムやグリーンアップルのような爽やかな酸味とカカオやナッツ類のようなコクが感じられる珈琲に仕上げています。',
    producer: 'マヤビニック生産者協同組合',
    region: 'メキシコ チアパス州',
    altitude: '1,000〜1,700m',
    variety: 'アラビカ種（ティピカ、ムンドヌーボ他）',
    process: 'ウォッシュト',
    note: '有機JAS認証、フェアトレード、農薬不使用'
  },
  'パプアニューギニア': null,
  'ミャンマー': null,
  'インドネシア': null,
  'デカフェ': null
};

function selectVariety(btn, name) {
  document.querySelectorAll(".variety-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("selected-variety").textContent = name;

  const data = BEANS[name];
  const detailBox = document.getElementById("bean-detail");
  const descEl = document.getElementById("bean-desc");

  if (!data) {
    detailBox.style.display = "none";
    descEl.textContent = "詳細情報は近日公開予定です。";
    return;
  }

  descEl.textContent = data.flavor;

  const fields = [
    ["生産者", data.producer],
    ["産地", data.region],
    ["標高", data.altitude],
    ["品種", data.variety],
    ["精製", data.process],
    ["その他", data.note]
  ];

  const table = document.getElementById("bean-table");
  table.innerHTML = fields.map(([k, v]) =>
    `<div class="product-detail-item"><span>${k}</span><span>${v}</span></div>`
  ).join("");

  detailBox.style.display = "block";
}
</script>
</body>
</html>
