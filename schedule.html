<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出店スケジュール — DREAMERS COFFEE</title>
<meta name="description" content="DREAMERS COFFEEの出店スケジュール。愛知県豊田市を中心にマルシェ・イベントへ出店中。最新情報はInstagramでもお知らせしています。">
<link rel="canonical" href="https://dreamerscoffee.shop/schedule.html">
<meta property="og:type" content="website">
<meta property="og:title" content="出店スケジュール — DREAMERS COFFEE">
<meta property="og:description" content="DREAMERS COFFEEの出店スケジュール。愛知県豊田市を中心にマルシェ・イベントへ出店中。">
<meta property="og:url" content="https://dreamerscoffee.shop/schedule.html">
<meta property="og:image" content="https://dreamerscoffee.shop/ogp.jpg">
<meta property="og:site_name" content="DREAMERS COFFEE">
<meta property="og:locale" content="ja_JP">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@_ko_hey__">
<meta name="twitter:title" content="出店スケジュール — DREAMERS COFFEE">
<meta name="twitter:description" content="DREAMERS COFFEEの出店スケジュール。愛知県豊田市を中心にマルシェ・イベントへ出店中。">
<meta name="twitter:image" content="https://dreamerscoffee.shop/ogp.jpg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FAFAF7;--white:#FFFFFF;
  --brown-deep:#2C1A0E;--brown:#5C3A1E;--brown-mid:#8B5E3C;
  --brown-light:#C49A6C;--brown-pale:#E8D5BE;--brown-mist:#F2EAE0;
  --text:#2C1A0E;--text-mid:#7A5C47;--text-light:#A8937E;
  --border:#E0D0BC;
  --font-serif:'Cormorant Garamond',serif;
  --font-sans:'Noto Sans JP',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
sup,sub{vertical-align:baseline;font-size:inherit;}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);font-weight:300;font-size:14px;line-height:1.7;}
a{color:inherit;text-decoration:none;}
img{display:block;width:100%;}

/* NAV */
.nav-wrap{position:sticky;top:0;z-index:200;background:var(--white);border-bottom:1px solid var(--border);}
.nav-inner{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 2rem;height:64px;}
.nav-logo{grid-column:2;font-size:1rem;letter-spacing:0.3em;color:var(--brown-deep);font-weight:400;}
.nav-back{grid-column:1;font-size:11px;letter-spacing:0.1em;color:var(--text-light);display:flex;align-items:center;gap:0.4rem;transition:color 0.2s;}
.nav-back:hover{color:var(--brown);}

/* HEADER */
.page-header{padding:4rem 2rem 3rem;max-width:1000px;margin:0 auto;border-bottom:1px solid var(--border);}
.page-label{font-size:10px;letter-spacing:0.4em;color:var(--brown-light);margin-bottom:0.8rem;}
.page-title{font-family:var(--font-serif);font-size:2.5rem;font-weight:300;color:var(--brown-deep);margin-bottom:1rem;}
.page-desc{font-size:13px;color:var(--text-mid);line-height:2;}

/* SCHEDULE */
.schedule-wrap{max-width:1000px;margin:0 auto;padding:3rem 2rem 5rem;}
.schedule-year{font-size:10px;letter-spacing:0.3em;color:var(--brown-light);margin-bottom:1.5rem;margin-top:2rem;}
.schedule-item{display:grid;grid-template-columns:130px 1fr;gap:2rem;padding:1.8rem 0;border-bottom:1px solid var(--border);align-items:start;}
.schedule-item:first-of-type{border-top:1px solid var(--border);}
.schedule-date{font-family:var(--font-serif);font-size:1.1rem;color:var(--brown);padding-top:2px;}
.schedule-name{font-size:14px;font-weight:500;color:var(--brown-deep);margin-bottom:0.3rem;}
.schedule-place{font-size:12px;color:var(--text-light);margin-bottom:0.4rem;}
.schedule-note{font-size:11px;color:var(--text-light);display:inline-block;background:var(--brown-mist);padding:2px 10px;}
.schedule-empty{padding:3rem 0;font-size:13px;color:var(--text-light);text-align:center;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}

/* SNS CTA */
.sns-cta{background:var(--brown-mist);border-top:1px solid var(--border);padding:3rem 2rem;text-align:center;}
.sns-cta p{font-size:13px;color:var(--text-mid);margin-bottom:1.5rem;line-height:2;}
.sns-btn{display:inline-flex;align-items:center;gap:0.7rem;background:var(--brown);color:white;font-size:12px;letter-spacing:0.15em;padding:14px 36px;transition:all 0.3s;}
.sns-btn:hover{background:var(--brown-deep);}

/* FOOTER */
.footer-mini{background:#100C09;padding:2rem;text-align:center;}
.footer-mini-logo{font-size:0.9rem;letter-spacing:0.3em;color:var(--brown-light);margin-bottom:0.8rem;}
.footer-mini-copy{font-size:11px;color:rgba(255,255,255,0.2);}

.reveal{opacity:0;transform:translateY(20px);transition:opacity 0.7s ease,transform 0.7s ease;}
.reveal.visible{opacity:1;transform:none;}

@media(max-width:768px){
  .page-header{padding:2.5rem 1.2rem 2rem;}
  .page-title{font-size:1.8rem;}
  .schedule-wrap{padding:2rem 1.2rem 4rem;}
  .schedule-item{grid-template-columns:1fr;gap:0.4rem;}
  .schedule-date{font-size:1rem;}
}
</style>
</head>
<body>

<div class="nav-wrap">
  <div class="nav-inner">
    <a class="nav-back" href="index.html">← ホーム</a>
    <a class="nav-logo" href="index.html">DREAMERS COFFEE</a>
  </div>
</div>

<div class="page-header reveal">
  <p class="page-label">SCHEDULE</p>
  <h1 class="page-title">出店スケジュール</h1>
</div>

<div style="max-width:1000px;margin:0 auto;">
  <img src="dreamerscoffee-shop-schedule.jpg" alt="DREAMERS COFFEE 出店の様子" style="width:100%;max-height:500px;object-fit:cover;object-position:center;">
</div>

<div class="schedule-wrap">

  <div class="schedule-item reveal">
    <div class="schedule-date">2026.03.15</div>
    <div>
      <div class="schedule-name">
        <a href="https://www.instagram.com/asahi_tourism_association" target="_blank" rel="noopener" style="color:var(--brown-deep);text-decoration:underline;text-underline-offset:3px;">旭マルシェ</a>
      </div>
      <div class="schedule-place">豊田市 旭観光協会・あさひ観光案内所<br>愛知県豊田市小渡町七升蒔13-13 旭農林会館</div>
      <span class="schedule-note">10:00〜14:00</span>
    </div>
  </div>

  <div class="schedule-item reveal">
    <div class="schedule-date">2026.03.22</div>
    <div>
      <div class="schedule-name">
        <a href="https://www.instagram.com/shikishimano.ie" target="_blank" rel="noopener" style="color:var(--brown-deep);text-decoration:underline;text-underline-offset:3px;">ふらっと祭</a>
      </div>
      <div class="schedule-place">しきしまの家<br>愛知県豊田市杉本町三斗成1-3</div>
      <span class="schedule-note">10:00〜14:00</span>
    </div>
  </div>

</div>

<div class="sns-cta reveal">
  <a href="https://www.instagram.com/dreamers_coffee/" target="_blank" class="sns-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
    Instagram をフォロー
  </a>
</div>

<div class="footer-mini">
  <div class="footer-mini-logo">DREAMERS COFFEE</div>
  <div class="footer-mini-copy">© 2026 DREAMERS COFFEE. All rights reserved.</div>
</div>

<script>
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
