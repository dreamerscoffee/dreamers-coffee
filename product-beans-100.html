.product-wrap{max-width:1000px;margin:0 auto;padding:4rem 2rem;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:start;}
.product-img{aspect-ratio:1;object-fit:cover;background:#f0e8dc;transition:opacity 0.3s;}
.product-tag{font-size:10px;letter-spacing:0.3em;color:var(--brown-light);margin-bottom:0.8rem;}
.product-name{font-family:var(--font-serif);font-size:2.5rem;font-weight:400;color:var(--brown-deep);margin-bottom:0.5rem;line-height:1.2;}

.product-price span{font-size:12px;color:var(--text-light);font-family:var(--font-sans);}
.product-desc{font-size:13px;color:var(--text-mid);line-height:2.2;margin-bottom:2rem;border-top:1px solid var(--border);padding-top:1.5rem;}
.product-detail{margin-bottom:2rem;}
.product-detail-title{font-size:10px;letter-spacing:0.2em;color:var(--text-light);margin-bottom:0.8rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem;}
.product-detail-item{display:flex;justify-content:space-between;font-size:12px;color:var(--text-mid);padding:0.5rem 0;border-bottom:1px dashed var(--border);}
.variety-section{margin-bottom:2rem;}
.variety-label{font-size:10px;letter-spacing:0.2em;color:var(--text-light);margin-bottom:0.8rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem;}
.variety-grid{display:flex;flex-wrap:wrap;gap:0.5rem;}
.variety-btn{border:1px solid var(--border);background:none;padding:7px 14px;font-size:11px;font-family:var(--font-sans);color:var(--text-mid);cursor:pointer;transition:all 0.2s;letter-spacing:0.05em;}
.variety-btn:hover{border-color:var(--brown);color:var(--brown);}
.variety-btn.active{border-color:var(--brown-deep);background:var(--brown-deep);color:white;}
.btn-buy{display:block;width:100%;background:var(--brown-deep);color:white;font-size:12px;letter-spacing:0.2em;padding:16px;text-align:center;margin-top:2rem;transition:background 0.3s;border:none;cursor:pointer;}
.btn-buy:hover{background:var(--brown);}
.btn-buy.disabled{background:#bbb;cursor:not-allowed;pointer-events:none;}
.related{background:var(--brown-mist);border-top:1px solid var(--border);}
.related-inner{max-width:1000px;margin:0 auto;padding:4rem 2rem;}
.related-title{font-size:10px;letter-spacing:0.3em;color:var(--brown-light);margin-bottom:2rem;}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}
.related-card{background:var(--white);border:1px solid var(--border);overflow:hidden;transition:transform 0.3s;}
.related-card:hover{transform:translateY(-3px);}
.related-card img{aspect-ratio:1;object-fit:cover;}
.related-card-body{padding:1rem;}
.related-card-name{font-size:13px;color:var(--brown-deep);margin-bottom:0.3rem;}
.related-card-price{font-size:12px;color:var(--brown-light);}
.footer-mini{background:#100C09;padding:2rem;text-align:center;}
.footer-mini-logo{font-size:0.9rem;letter-spacing:0.3em;color:var(--brown-light);margin-bottom:0.8rem;}
.footer-mini-copy{font-size:11px;color:rgba(255,255,255,0.2);}
@media(max-width:768px){.product-wrap{grid-template-columns:1fr;gap:2rem;}.related-grid{grid-template-columns:1fr 1fr;}}

<script>
const BEANS = {
  'グアテマラ': {
    flavor: 'みかんやオレンジのような優しい酸味と柔らかな甘さ、ややカカオっぽいコクが特徴の珈琲に仕上げています。',
    producer: 'パストレス水洗工場周辺の小規模農家',
    region: 'グアテマラ サカテペケス県 アンティグア',
    altitude: '1,500〜1,700m',
    variety: 'ブルボン、カツアイ等',
    process: 'ウォッシュト',
    note: '農薬不使用',
    image: 'https://images.unsplash.com/photo-1611854779393-1b2da9d400fe?w=700&q=80',
    stripe: null
  },
  'メキシコ': {
    flavor: 'ライムやグリーンアップルのような爽やかな酸味とカカオやナッツ類のようなコクが感じられる珈琲に仕上げています。',
    producer: 'マヤビニック生産者協同組合',
    region: 'メキシコ チアパス州',
    altitude: '1,000〜1,700m',
    variety: 'アラビカ種（ティピカ、ムンドヌーボ他）',
    process: 'ウォッシュト',
    note: '有機JAS認証、フェアトレード、農薬不使用',
    image: 'https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=700&q=80',
    stripe: 'https://buy.stripe.com/cNi5kF72C1NneJg3Pz4Ja03'
  },
  'パプアニューギニア': {
    flavor: null, image: 'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=700&q=80', stripe: null
  },
  'ペルー': {
    flavor: 'いちごみたいな柔らかい酸味や焼きりんごの甘酸っぱさとほろ苦さがバランスの良いティーライクな珈琲に仕上げています。',
    producer: 'TUNKIMAYU COFFEE / ANEAN AMAZON COFFEE',
    region: 'ペルー',
    altitude: '1,800〜2,100m',
    variety: 'アラビカ種（レッドブルボン）',
    process: '72時間発酵、ウォッシュト',
    note: 'トップスペシャルティコーヒー、栽培期間中農薬不使用',
    image: 'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=700&q=80',
    stripe: null
  },
  'ミャンマー': {
    flavor: null, image: 'https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=700&q=80', stripe: null
  },
  'インドネシア': {
    flavor: null, image: 'https://images.unsplash.com/photo-1442512595331-e89e73853f31?w=700&q=80', stripe: null
  },
  'デカフェ': {
    flavor: null, image: 'https://images.unsplash.com/photo-1506619216599-9d16d0903dfd?w=700&q=80', stripe: null
  }
};

function selectVariety(btn, name) {
  document.querySelectorAll('.variety-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const data = BEANS[name];
  const detailBox = document.getElementById('bean-detail');
  const descEl = document.getElementById('bean-desc');
  const imgEl = document.getElementById('product-img');
  const buyBtn = document.getElementById('btn-buy');

  // 画像をフェードで切り替え
  imgEl.style.opacity = '0';
  setTimeout(() => {
    imgEl.src = data.image;
    imgEl.style.opacity = '1';
  }, 200);

  // カートに追加
  buyBtn.onclick = null;
  if (data.flavor !== null || data.stripe !== null) {
    buyBtn.classList.remove('disabled');
    buyBtn.textContent = 'カートに追加';
    buyBtn.onclick = function(e) {
      e.preventDefault();
      Cart.addItem({
        id: 'beans100',
        name: '珈琲豆 105g（7日分）',
        variant: name,
        price: name === 'デカフェ' ? 1080 : 980,
        image: data.image,
      });
    };
  } else {
    buyBtn.href = '#';
    buyBtn.classList.add('disabled');
    buyBtn.textContent = '準備中';
  }
  // フレーバー・詳細
  if (!data.flavor) {
    detailBox.style.display = 'none';
    descEl.textContent = '詳細情報は近日公開予定です。';
    return;
  }

  descEl.textContent = data.flavor;

  const fields = [
    ['生産者', data.producer],
    ['産地', data.region],
    ['標高', data.altitude],
    ['品種', data.variety],
    ['精製', data.process],
    ['その他', data.note]
  ].filter(([, v]) => v);

  document.getElementById('bean-table').innerHTML = fields.map(([k, v]) =>
    `<div class="product-detail-item"><span>${k}</span><span>${v}</span></div>`
  ).join('');

  detailBox.style.display = 'block';
}
</script>
