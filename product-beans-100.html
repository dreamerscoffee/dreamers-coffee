<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>珈琲豆セレクション — DREAMERS COFFEE</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#FAFAF7; --white:#FFFFFF; --brown-deep:#2C1A0E; --brown:#5C3A1E;
      --brown-light:#C49A6C; --text:#2C1A0E; --text-mid:#7A5C47; --text-light:#A8937E; --border:#E0D0BC;
      --font-serif:'Cormorant Garamond',serif; --font-sans:'Noto Sans JP',sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:var(--font-sans); background:var(--bg); color:var(--text); font-weight:300; line-height:1.7; }
    
    /* Navigation */
    .nav-wrap { position:sticky; top:0; z-index:200; background:var(--brown-deep); color:var(--brown-light); }
    .nav-inner { max-width:1100px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; padding:0 2rem; height:64px; }
    .nav-logo { font-size:1.1rem; letter-spacing:0.3em; font-weight:400; text-decoration:none; color:inherit; }

    /* Catalog Grid */
    .container { max-width:1100px; margin:4rem auto; padding:0 2rem; }
    .section-title { font-family:var(--font-serif); font-size:2rem; text-align:center; margin-bottom:3rem; letter-spacing:0.1em; color:var(--brown-deep); }
    .catalog-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:2.5rem; }

    /* Card Style */
    .product-card { background:var(--white); border:1px solid var(--border); transition:transform 0.3s, box-shadow 0.3s; cursor:pointer; position: relative; }
    .product-card:hover { transform:translateY(-5px); box-shadow:0 10px 20px rgba(0,0,0,0.05); }
    .product-card img { width:100%; aspect-ratio:1; object-fit:cover; display:block; }
    .product-card.coming-soon img { opacity: 0.6; filter: grayscale(1); }
    .card-body { padding:1.5rem; text-align:center; }
    .card-name { font-size:1rem; color:var(--brown-deep); margin-bottom:0.5rem; font-weight:400; }
    .card-price { font-size:0.9rem; color:var(--brown-light); font-family:var(--font-serif); }
    .status-badge { position: absolute; top: 10px; right: 10px; background: rgba(44, 26, 14, 0.8); color: white; font-size: 10px; padding: 4px 8px; letter-spacing: 0.1em; }

    /* Modal Style */
    .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; z-index:1000; justify-content:center; align-items:center; backdrop-filter:blur(4px); padding:1rem; }
    .modal-content { background:var(--bg); width:100%; max-width:900px; max-height:90vh; overflow-y:auto; position:relative; border-radius:2px; display:grid; grid-template-columns:1fr 1fr; gap:2rem; padding:3rem; }
    .close-btn { position:absolute; top:1rem; right:1.5rem; font-size:2.5rem; cursor:pointer; color:var(--text-light); line-height:1; }

    /* Product Detail inside Modal */
    .modal-img { width:100%; aspect-ratio:1; object-fit:cover; background:#f0e8dc; }
    .modal-tag { font-size:10px; letter-spacing:0.3em; color:var(--brown-light); margin-bottom:0.5rem; }
    .modal-name { font-family:var(--font-serif); font-size:2rem; font-weight:400; color:var(--brown-deep); margin-bottom:1rem; line-height:1.2; }
    .modal-desc { font-size:13px; color:var(--text-mid); line-height:2; margin-bottom:2rem; border-top:1px solid var(--border); padding-top:1.5rem; }
    .detail-item { display:flex; justify-content:space-between; font-size:12px; color:var(--text-mid); padding:0.5rem 0; border-bottom:1px dashed var(--border); }
    .btn-buy { width:100%; background:var(--brown-deep); color:white; font-size:12px; letter-spacing:0.2em; padding:16px; text-align:center; margin-top:2rem; border:none; cursor:pointer; transition:0.3s; }
    .btn-buy:hover:not(.disabled) { background:var(--brown); }
    .btn-buy.disabled { background:#bbb; cursor:not-allowed; }

    /* Responsive */
    @media(max-width:768px){
      .modal-content { grid-template-columns:1fr; padding:1.5rem; }
      .catalog-grid { grid-template-columns:1fr 1fr; gap:1rem; }
    }
  </style>
</head>
<body>

<div class="nav-wrap">
  <div class="nav-inner">
    <a class="nav-logo" href="#">DREAMERS COFFEE</a>
    <div style="font-size: 11px; letter-spacing: 0.1em;">CART (0)</div>
  </div>
</div>

<div class="container">
  <h2 class="section-title">Coffee Beans Selection</h2>
  <div class="catalog-grid" id="catalog-container">
    </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img id="modal-img" src="" alt="" class="modal-img">
    <div>
      <p class="modal-tag">SINGLE ORIGIN</p>
      <h1 id="modal-title" class="modal-name"></h1>
      <div id="modal-price" style="font-family:var(--font-serif); font-size:1.5rem; margin-bottom:1.5rem;"></div>
      <p id="modal-desc" class="modal-desc"></p>
      <div id="modal-spec"></div>
      <button id="modal-buy-btn" class="btn-buy">カートに追加する</button>
    </div>
  </div>
</div>

<script>
const BEANS = {
  'グアテマラ': {
    flavor: 'みかんやオレンジのような優しい酸味と柔らかな甘さ、ややカカオっぽいコクが特徴の珈琲に仕上げています。',
    producer: 'パストレス水洗工場周辺の小規模農家',
    region: 'アンティグア',
    altitude: '1,500〜1,700m',
    process: 'ウォッシュト',
    image: 'https://images.unsplash.com/photo-1611854779393-1b2da9d400fe?w=700&q=80',
    available: true
  },
  'メキシコ': {
    flavor: 'ライムやグリーンアップルのような爽やかな酸味とカカオやナッツ類のようなコクが感じられる珈琲に仕上げています。',
    producer: 'マヤビニック生産者協同組合',
    region: 'チアパス州',
    altitude: '1,000〜1,700m',
    process: 'ウォッシュト',
    image: 'https://images.unsplash.com/photo-1559056199-641a0ac8b55e?w=700&q=80',
    available: true
  },
  'パプアニューギニア': {
    flavor: null,
    producer: 'シグリ農園',
    region: 'ワギ・バレー',
    altitude: '1,500m',
    process: 'ウォッシュト',
    image: 'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=700&q=80',
    available: false
  },
  'ペルー': {
    flavor: 'いちごみたいな柔らかい酸味や焼きりんごの甘酸っぱさとほろ苦さがバランスの良いティーライクな珈琲に仕上げています。',
    producer: 'TUNKIMAYU COFFEE',
    region: 'ペルー',
    altitude: '1,800〜2,100m',
    process: '72時間発酵',
    image: 'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=700&q=80',
    available: true
  },
  'ミャンマー': {
    flavor: null,
    producer: '小規模農家組合',
    region: 'ユアンガン',
    altitude: '1,400m〜',
    process: 'ナチュラル',
    image: 'https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=700&q=80',
    available: false
  },
  'インドネシア': {
    flavor: null,
    producer: 'リントン地区農家',
    region: 'スマトラ島',
    altitude: '1,200〜1,500m',
    process: 'スマトラ式',
    image: 'https://images.unsplash.com/photo-1442512595331-e89e73853f31?w=700&q=80',
    available: false
  },
  'デカフェ': {
    flavor: 'カフェインを99%除去しながらも、豆本来の甘みとコクをしっかり残した一杯に仕上げています。',
    producer: '非公開',
    region: '中南米',
    altitude: '1,200m〜',
    process: 'マウンテンウォーター方式',
    image: 'https://images.unsplash.com/photo-1506619216599-9d16d0903dfd?w=700&q=80',
    available: true
  }
};

// カード一覧を表示
function renderCatalog() {
  const container = document.getElementById('catalog-container');
  container.innerHTML = Object.entries(BEANS).map(([name, data]) => {
    const price = name === 'デカフェ' ? '1,080' : '980';
    const comingSoonClass = data.available ? '' : 'coming-soon';
    const badge = data.available ? '' : '<div class="status-badge">PREPARING</div>';
    
    return `
      <div class="product-card ${comingSoonClass}" onclick="openModal('${name}')">
        ${badge}
        <img src="${data.image}" alt="${name}">
        <div class="card-body">
          <div class="card-name">${name} 105g</div>
          <div class="card-price">¥${price}</div>
        </div>
      </div>
    `;
  }).join('');
}

// モーダルを開く
function openModal(name) {
  const data = BEANS[name];
  const price = name === 'デカフェ' ? 1080 : 980;
  
  document.getElementById('modal-img').src = data.image;
  document.getElementById('modal-title').textContent = name;
  document.getElementById('modal-price').textContent = data.available ? `¥${price.toLocaleString()} (税込)` : 'COMING SOON';
  document.getElementById('modal-desc').textContent = data.flavor || "この豆の詳細は現在準備中です。近日公開予定ですので楽しみにお待ちください。";

  const specs = [
    ['生産者', data.producer],
    ['産地', data.region],
    ['標高', data.altitude],
    ['精製', data.process]
  ];

  document.getElementById('modal-spec').innerHTML = specs.map(([k, v]) => `
    <div class="detail-item"><span>${k}</span><span>${v}</span></div>
  `).join('');

  const btn = document.getElementById('modal-buy-btn');
  if (data.available) {
    btn.classList.remove('disabled');
    btn.textContent = 'カートに追加する';
    btn.onclick = () => {
      alert(`${name}をカートに追加しました。`);
      closeModal();
    };
  } else {
    btn.classList.add('disabled');
    btn.textContent = '準備中';
    btn.onclick = null;
  }

  document.getElementById('modal-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

// モーダルを閉じる
function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.body.style.overflow = 'auto';
}

// 起動
renderCatalog();
</script>

</body>
</html>
